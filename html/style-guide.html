<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Style Guide – Cybersecurity Blog</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Inline overrides for the guide itself */
    body { background: var(--color-bg); color: #e0e0e0; font-family: var(--font-body); }
    .token { padding: var(--space-sm); border: 1px solid var(--color-muted); border-radius: var(--radius-md); margin-bottom: var(--space-md); }
  </style>
</head>
<body>
  <header class="token">
    <h1 style="font-family: var(--font-heading); color: var(--color-primary);">Cybersecurity Blog – Style Guide</h1>
  </header>

  <main class="token">
    <section id="colors">
      <h2 style="font-family: var(--font-heading); color: var(--color-primary);">Palette</h2>
      <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
        <div style="flex: 1 1 150px; padding: 1rem; background: var(--color-bg); border: 1px solid var(--color-muted); border-radius: 8px;">
          <strong>--color-bg</strong>
          <div style="height: 60px; background: var(--color-bg); margin-top: 0.5rem;"></div>
          <code>#0a0a0a</code>
        </div>
        <div style="flex: 1 1 150px; padding: 1rem; background: var(--color-surface); border: 1px solid var(--color-muted); border-radius: 8px;">
          <strong>--color-surface</strong>
          <div style="height: 60px; background: var(--color-surface); margin-top: 0.5rem;"></div>
          <code>#1e1e1e</code>
        </div>
        <div style="flex: 1 1 150px; padding: 1rem; background: var(--color-primary); border: 1px solid var(--color-muted); border-radius: 8px; color: #fff;">
          <strong>--color-primary</strong>
          <div style="height: 60px; background: var(--color-primary); margin-top: 0.5rem;"></div>
          <code>#00ffea</code>
        </div>
        <div style="flex: 1 1 150px; padding: 1rem; background: var(--color-accent); border: 1px solid var(--color-muted); border-radius: 8px; color: #fff;">
          <strong>--color-accent</strong>
          <div style="height: 60px; background: var(--color-accent); margin-top: 0.5rem;"></div>
          <code>#ff00c8</code>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
